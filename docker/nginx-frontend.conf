server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    client_max_body_size 50M;

    # Easypanel / load balancer health check
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 'ok';
    }

    # API proxy (Easypanel path önceliği sorununu bypass)
    location /api {
        proxy_pass http://tekneturu_tekneturu-api:5244;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }
    location /t {
        proxy_pass http://tekneturu_tekneturu-api:5244;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /uploads {
        proxy_pass http://tekneturu_tekneturu-api:5244;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /thanks -> /landing/thanks
    location = /thanks {
        return 301 /landing/thanks;
    }

    # Desk (root)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Admin SPA
    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        try_files $uri $uri/ /admin/index.html;
    }
    location = /admin { return 301 /admin/; }

    # Check-in SPA
    location /checkin/ {
        alias /usr/share/nginx/html/checkin/;
        try_files $uri $uri/ /checkin/index.html;
    }
    location = /checkin { return 301 /checkin/; }

    # Acenta SPA
    location /acenta/ {
        alias /usr/share/nginx/html/acenta/;
        try_files $uri $uri/ /acenta/index.html;
    }
    location = /acenta { return 301 /acenta/; }

    # Landing SPA
    location /landing/ {
        alias /usr/share/nginx/html/landing/;
        try_files $uri $uri/ /landing/index.html;
    }
    location = /landing { return 301 /landing/; }
}
